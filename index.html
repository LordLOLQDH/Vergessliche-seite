<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontaktformular</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
        background: #f0f2f5;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

.form-container {
        background: white;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        width: 100%;
        max-width: 500px;
    }

 h1 {
        font-size: 28px;
        color: #1a1a1a;
        margin-bottom: 8px;
    }

.subtitle {
        color: #666;
        font-size: 14px;
        margin-bottom: 30px;
    }

.form-group {
        margin-bottom: 20px;
    }

 label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-size: 14px;
        font-weight: 500;
    }

 input, textarea {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e1e1e1;
        border-radius: 10px;
        font-size: 15px;
        transition: all 0.2s;
    }

 input:focus, textarea:focus {
        outline: none;
        border-color: #007aff;
    }

 textarea {
        resize: vertical;
        min-height: 100px;
        font-family: inherit;
    }

.memory-status {
        font-size: 13px;
        color: #999;
        font-style: italic;
        min-height: 18px;
        margin-top: 8px;
        transition: color 0.3s;
    }

.memory-status.angry {
        color: #ff3b30;
        font-weight: 600;
    }

.btn-submit {
        width: 100%;
        padding: 14px;
        background: #007aff;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 10px;
    }

.btn-submit:hover {
        background: #0051d5;
    }

.btn-submit:disabled {
        background: #ccc;
        cursor: not-allowed;
    }

.success {
        display: none;
        text-align: center;
        padding: 40px 20px;
    }

.success.show {
        display: block;
    }

.success h2 {
        color: #34c759;
        margin-bottom: 10px;
    }

.hint {
        margin-top: 25px;
        padding: 15px;
        background: #fff3cd;
        border-left: 4px solid #ffc107;
        border-radius: 6px;
        font-size: 13px;
        color: #856404;
        display: none;
    }

.hint.show {
        display: block;
    }
</style>
</head>
<body>
    <div class="form-container">
        <div id="formSection">
            <h1>Kontakt</h1>
            <p class="subtitle">Schreib uns eine Nachricht</p>

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Max Mustermann">
            </div>

            <div class="form-group">
                <label for="email">E-Mail</label>
                <input type="email" id="email" placeholder="max@example.com">
            </div>

            <div class="form-group">
                <label for="nachricht">Nachricht</label>
                <textarea id="nachricht" placeholder="Deine Nachricht..."></textarea>
                <div class="memory-status" id="memoryStatus">Mein Gedächtnis ist perfekt</div>
            </div>

            <button class="btn-submit" id="submitBtn" onclick="submit()">Absenden</button>

            <div class="hint" id="hint">Tipp: Nutze Tab um durch die Felder zu springen, ohne die Maus zu benutzen</div>
        </div>

        <div class="success" id="successScreen">
            <h2>✓ Abgesendet</h2>
            <p>Danke! Tab-Taste > Maus-Klicks</p>
        </div>
    </div>

<script>
    let unlocked = false;
    let forgetCount = 0;
    let lastFocused = null;

    const name = document.getElementById('name');
    const email = document.getElementById('email');
    const nachricht = document.getElementById('nachricht');
    const memoryStatus = document.getElementById('memoryStatus');
    const hint = document.getElementById('hint');
    const submitBtn = document.getElementById('submitBtn');
    const formSection = document.getElementById('formSection');
    const successScreen = document.getElementById('successScreen');

    const inputs = [name, email, nachricht];
    const statusTexte = [
        'Mein Gedächtnis ist perfekt',
        'Ups, was stand da nochmal?',
        'Huch, schon wieder vergessen',
        'Mein Kurzzeitgedächtnis...',
        'Sorry, bin vergesslich heute',
        'Okay das ist peinlich'
    ];

    // Vergesslichkeits-Logik
    inputs.forEach((input, index) => {
        input.addEventListener('focus', () => {
            if (unlocked) return;

            // Wenn man von einem Feld zum nächsten springt, lösche das vorherige
            if (lastFocused!== null && lastFocused!== index && lastFocused < index) {
                inputs[lastFocused].value = '';
                forgetCount++;

                if (forgetCount >= statusTexte.length) {
                    memoryStatus.textContent = statusTexte[statusTexte.length - 1];
                } else {
                    memoryStatus.textContent = statusTexte[forgetCount];
                }

                memoryStatus.classList.add('angry');

                if (forgetCount === 2) {
                    hint.classList.add('show');
                }

                setTimeout(() => memoryStatus.classList.remove('angry'), 500);
            }

            lastFocused = index;
        });
    });

    function submit() {
        // Check ob alle Felder ausgefüllt sind
        if (!name.value ||!email.value ||!nachricht.value) {
            memoryStatus.textContent = 'Erst alle Felder ausfüllen!';
            memoryStatus.classList.add('angry');
            setTimeout(() => memoryStatus.classList.remove('angry'), 500);
            return;
        }

        // Wenn man es geschafft hat = mit Tab durchgegangen
        unlocked = true;
        formSection.style.display = 'none';
        successScreen.classList.add('show');
    }
</script>
</body>
</html>
